<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jarvis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #000; font-family: -apple-system, system-ui, sans-serif; color: #fff; }
    .app { height: 100%; display: flex; flex-direction: column; }
    .bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; border-bottom: 1px solid #111; flex-shrink: 0; font-size: 13px;
    }
    .bar a { color: #555; text-decoration: none; }
    .bar .title { color: #4ea8de; font-weight: 700; }
    .bar .status { font-size: 11px; color: #444; }
    .chat-area {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .msg {
      max-width: 85%; padding: 10px 14px; border-radius: 16px;
      font-size: 15px; line-height: 1.5; animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } }
    .msg-user { align-self: flex-end; background: #1a3a5c; border-bottom-right-radius: 4px; }
    .msg-jarvis { align-self: flex-start; background: #1a1a1a; border-bottom-left-radius: 4px; }
    .msg-jarvis .mood { font-size: 11px; color: #4ea8de; margin-bottom: 4px; font-style: italic; }
    .msg-system { align-self: center; color: #444; font-size: 12px; background: none; padding: 4px; }
    .msg-partial { align-self: flex-end; color: #557799; font-style: italic; background: none; padding: 4px 0; font-size: 13px; }
    .msg-jarvis.streaming::after { content: '\25CF'; animation: blink 1s infinite; margin-left: 2px; color: #4ea8de; }
    @keyframes blink { 50% { opacity: 0; } }
    .orb-area { display: flex; justify-content: center; align-items: center; padding: 20px 0 10px; flex-shrink: 0; }
    .orb {
      width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #1a3a5c, #0a1a2e);
      border: 2px solid #1a3a5c; cursor: pointer; transition: all 0.3s;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .orb:active { transform: scale(0.95); }
    .orb.listening { border-color: #e74c3c; box-shadow: 0 0 30px rgba(231,76,60,0.3); }
    .orb.transcribing { border-color: #f39c12; box-shadow: 0 0 20px rgba(243,156,18,0.3); animation: pulse-orb 1s ease-in-out infinite; }
    .orb.thinking { animation: pulse-orb 1.5s ease-in-out infinite; border-color: #4ea8de; }
    .orb.speaking { animation: pulse-orb 0.6s ease-in-out infinite; border-color: #4ea8de; box-shadow: 0 0 40px rgba(78,168,222,0.4); }
    @keyframes pulse-orb {
      0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(78,168,222,0.2); }
      50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(78,168,222,0.4); }
    }
    .orb svg { width: 32px; height: 32px; fill: #4ea8de; }
    .orb.listening svg { fill: #e74c3c; }
    .orb.transcribing svg { fill: #f39c12; }
    .input-area { padding: 8px 16px 16px; flex-shrink: 0; }
    .input-row { display: flex; gap: 8px; }
    .input-row input {
      flex: 1; padding: 12px 16px; border-radius: 24px; border: 1px solid #222;
      background: #111; color: #fff; font-size: 15px; outline: none; font-family: inherit;
    }
    .input-row input::placeholder { color: #444; }
    .send-btn {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: #1a3a5c; color: #4ea8de; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="bar">
      <a href="/">&larr; chat</a>
      <span class="title">Jarvis</span>
      <span class="status" id="status">connecting...</span>
    </div>
    <div class="chat-area" id="chat"></div>
    <div class="orb-area">
      <div class="orb" id="orb" onclick="toggleMic()">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <input id="input" type="text" placeholder="Type to Jarvis..." autocomplete="off">
        <button class="send-btn" onclick="sendText()">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M8 14a.75.75 0 0 1-.75-.75V4.56L4.03 7.78a.75.75 0 0 1-1.06-1.06l4.5-4.5a.75.75 0 0 1 1.06 0l4.5 4.5a.75.75 0 0 1-1.06 1.06L8.75 4.56v8.69A.75.75 0 0 1 8 14Z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    var ws = null;
    var currentJarvisMsg = null;
    var currentJarvisText = '';
    var chat = document.getElementById('chat');
    var orb = document.getElementById('orb');
    var statusEl = document.getElementById('status');
    var inputEl = document.getElementById('input');
    var audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // ── WebSocket to Jarvis ────────────────────────────────
    function connect() {
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host + '/jarvis-ws');
      ws.onopen = function() {
        statusEl.textContent = 'connected';
        addMsg('system', 'Connected to Jarvis');
        // Activate headless — no desktop UI, just sets uiActive=true
        fetch('/jarvis-api/headless', { method: 'POST' });
      };
      ws.onclose = function() { statusEl.textContent = 'disconnected'; setTimeout(connect, 3000); };
      ws.onerror = function() { statusEl.textContent = 'error'; };
      ws.onmessage = function(e) { try { handleMessage(JSON.parse(e.data)); } catch(err) {} };
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'state':
          statusEl.textContent = msg.active ? 'active' : 'idle';
          break;
        case 'state_change':
          statusEl.textContent = msg.state;
          if (msg.state === 'thinking') orb.className = 'orb thinking';
          else if (msg.state === 'speaking') orb.className = 'orb speaking';
          else orb.className = 'orb';
          break;
        case 'user_partial':
          updatePartial(msg.text);
          break;
        case 'user_transcript':
          removePartial();
          addMsg('user', msg.text);
          break;
        case 'jarvis_token':
          if (!currentJarvisMsg) { currentJarvisMsg = addMsg('jarvis', '', true); currentJarvisText = ''; }
          currentJarvisText += msg.token;
          currentJarvisMsg.querySelector('.text').textContent = currentJarvisText;
          scrollBottom();
          break;
        case 'jarvis_response':
          if (currentJarvisMsg) {
            currentJarvisMsg.classList.remove('streaming');
            if (msg.envelope) {
              var moodEl = currentJarvisMsg.querySelector('.mood');
              if (moodEl && msg.envelope.mood) moodEl.textContent = msg.envelope.mood;
              var textEl = currentJarvisMsg.querySelector('.text');
              if (textEl && msg.envelope.response) textEl.textContent = msg.envelope.response;
              // Speak the response on the phone
              speakOnPhone(msg.envelope.response);
            }
          }
          currentJarvisMsg = null;
          currentJarvisText = '';
          break;
        case 'speaking_started':
          // Server is speaking locally — we ignore this, we play on phone instead
          break;
      }
    }

    // ── TTS: speak on the phone ────────────────────────────
    function speakOnPhone(text) {
      if (!text) return;
      ensureAudio();
      orb.className = 'orb speaking';
      statusEl.textContent = 'speaking';

      fetch('/jarvis-api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, speaker: 'cloned', language: 'English' })
      }).then(function(r) {
        if (!r.ok) throw new Error('TTS failed');
        return r.arrayBuffer();
      }).then(function(buf) {
        audioCtx.decodeAudioData(buf, function(buffer) {
          var source = audioCtx.createBufferSource();
          source.buffer = buffer;
          source.connect(audioCtx.destination);
          source.onended = function() { orb.className = 'orb'; statusEl.textContent = 'idle'; };
          source.start();
        }, function() {
          orb.className = 'orb'; statusEl.textContent = 'idle';
        });
      }).catch(function() {
        orb.className = 'orb'; statusEl.textContent = 'idle';
      });
    }

    // ── Send text ──────────────────────────────────────────
    function sendText() {
      var text = inputEl.value.trim();
      if (!text || !ws || ws.readyState !== 1) return;
      inputEl.value = '';
      ensureAudio();
      addMsg('user', text);
      ws.send(JSON.stringify({ type: 'user_speech', text: text }));
    }

    inputEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendText(); });

    // ── Voice input: MediaRecorder → server Whisper ────────
    var mediaRec = null;
    var recording = false;

    function toggleMic() {
      ensureAudio();
      if (recording) {
        stopRecording();
      } else {
        startRecording();
      }
    }

    function startRecording() {
      navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } }).then(function(stream) {
        recording = true;
        orb.className = 'orb listening';
        statusEl.textContent = 'listening...';

        var options = {};
        if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
          options.mimeType = 'audio/webm;codecs=opus';
        } else if (MediaRecorder.isTypeSupported('audio/mp4')) {
          options.mimeType = 'audio/mp4';
        }

        mediaRec = new MediaRecorder(stream, options);
        var chunks = [];
        mediaRec.ondataavailable = function(e) { if (e.data.size > 0) chunks.push(e.data); };
        mediaRec.onstop = function() {
          stream.getTracks().forEach(function(t) { t.stop(); });
          var blob = new Blob(chunks, { type: mediaRec.mimeType });
          transcribeAudio(blob);
        };
        mediaRec.start();
      }).catch(function(err) {
        addMsg('system', 'Mic error: ' + err.message);
        recording = false;
        orb.className = 'orb';
      });
    }

    function stopRecording() {
      recording = false;
      if (mediaRec && mediaRec.state !== 'inactive') {
        mediaRec.stop();
      }
      orb.className = 'orb transcribing';
      statusEl.textContent = 'transcribing...';
    }

    function transcribeAudio(blob) {
      fetch('/jarvis-api/transcribe', {
        method: 'POST',
        headers: { 'Content-Type': blob.type || 'audio/webm' },
        body: blob
      }).then(function(r) { return r.json(); })
      .then(function(data) {
        var text = (data.text || '').trim();
        if (text) {
          addMsg('user', text);
          orb.className = 'orb thinking';
          statusEl.textContent = 'thinking';
          ws.send(JSON.stringify({ type: 'user_speech', text: text }));
        } else {
          addMsg('system', 'No speech detected');
          orb.className = 'orb';
          statusEl.textContent = 'idle';
        }
      }).catch(function(err) {
        addMsg('system', 'Transcription failed');
        orb.className = 'orb';
        statusEl.textContent = 'idle';
      });
    }

    // ── Chat helpers ───────────────────────────────────────
    function addMsg(type, text, streaming) {
      var div = document.createElement('div');
      div.className = 'msg msg-' + type + (streaming ? ' streaming' : '');
      if (type === 'jarvis') {
        div.innerHTML = '<div class="mood"></div><div class="text">' + escapeHtml(text) + '</div>';
      } else {
        div.textContent = text;
      }
      chat.appendChild(div);
      scrollBottom();
      return div;
    }
    var partialEl = null;
    function updatePartial(text) {
      if (!partialEl) { partialEl = document.createElement('div'); partialEl.className = 'msg msg-partial'; chat.appendChild(partialEl); }
      partialEl.textContent = text + '...';
      scrollBottom();
    }
    function removePartial() { if (partialEl) { partialEl.remove(); partialEl = null; } }
    function scrollBottom() { chat.scrollTop = chat.scrollHeight; }
    function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    connect();
  </script>
</body>
</html>
