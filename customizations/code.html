<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>numz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; }

    /* PIN Screen */
    .pin-screen {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
    }
    .pin-screen.hidden { display: none; }
    .pin-title {
      font-size: 20px;
      font-weight: 300;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .pin-subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 32px;
      height: 18px;
    }
    .pin-subtitle.error { color: #ff3b30; }
    .pin-dots {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
    }
    .pin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #555;
      transition: all 0.15s;
    }
    .pin-dot.filled {
      background: #fff;
      border-color: #fff;
    }
    .pin-dot.error {
      border-color: #ff3b30;
      background: #ff3b30;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }
    .pin-pad {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      gap: 12px;
    }
    .pin-key {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1px solid #333;
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 32px;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .pin-key:active { background: rgba(255,255,255,0.2); }
    .pin-key .letters {
      font-size: 9px;
      letter-spacing: 2px;
      color: #888;
      margin-top: 2px;
      font-weight: 500;
    }
    .pin-key.empty {
      border: none;
      background: transparent;
      cursor: default;
    }
    .pin-key.delete {
      border: none;
      background: transparent;
      font-size: 16px;
      color: #888;
    }
    .pin-key.delete:active { color: #fff; }
    .pin-back {
      position: absolute;
      top: 16px;
      left: 16px;
    }
    .pin-back a {
      color: #555;
      text-decoration: none;
      font-size: 14px;
    }
    .pin-back a:hover { color: #999; }

    /* Terminal */
    .terminal-wrap {
      display: none;
      height: 100%;
      flex-direction: column;
    }
    .terminal-wrap.show { display: flex; }
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: #0d0d0d;
      border-bottom: 1px solid #1a1a1a;
      font-size: 13px;
      flex-shrink: 0;
    }
    .bar a { color: #666; text-decoration: none; }
    .bar a:hover { color: #999; }
    .bar .title { color: #4ec9b0; font-weight: 700; font-family: monospace; }
    iframe {
      width: 100%;
      flex: 1;
      border: none;
      background: #000;
    }

    /* iOS keyboard toolbar */
    .kb-toolbar {
      display: none;
      flex-shrink: 0;
      background: #1c1c1e;
      border-top: 1px solid #333;
      padding: 6px 8px;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .kb-toolbar.show { display: flex; }
    .kb-btn {
      height: 38px;
      min-width: 44px;
      padding: 0 12px;
      border-radius: 6px;
      border: none;
      background: #2c2c2e;
      color: #fff;
      font-size: 15px;
      font-family: -apple-system, system-ui, sans-serif;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .kb-btn:active { background: #3a3a3c; }
    .kb-btn.wide { min-width: 56px; }
    .kb-btn.accent { background: #0a84ff; }
    .kb-btn.accent:active { background: #0070e0; }
  </style>
</head>
<body>

  <!-- PIN Screen -->
  <div class="pin-screen" id="pin-screen">
    <div class="pin-back"><a href="/">&larr; back</a></div>
    <div class="pin-title">numz</div>
    <div class="pin-subtitle" id="pin-msg">Enter PIN</div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinKey('1')">1<span class="letters">&nbsp;</span></button>
      <button class="pin-key" onclick="pinKey('2')">2<span class="letters">ABC</span></button>
      <button class="pin-key" onclick="pinKey('3')">3<span class="letters">DEF</span></button>
      <button class="pin-key" onclick="pinKey('4')">4<span class="letters">GHI</span></button>
      <button class="pin-key" onclick="pinKey('5')">5<span class="letters">JKL</span></button>
      <button class="pin-key" onclick="pinKey('6')">6<span class="letters">MNO</span></button>
      <button class="pin-key" onclick="pinKey('7')">7<span class="letters">PQRS</span></button>
      <button class="pin-key" onclick="pinKey('8')">8<span class="letters">TUV</span></button>
      <button class="pin-key" onclick="pinKey('9')">9<span class="letters">WXYZ</span></button>
      <button class="pin-key empty"></button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key delete" onclick="pinDelete()">Delete</button>
    </div>
  </div>

  <!-- Terminal (hidden until PIN verified) -->
  <div class="terminal-wrap" id="terminal">
    <div class="bar">
      <a href="/">&larr; chat</a>
      <span class="title">numz</span>
      <span></span>
    </div>
    <iframe id="tty-frame" allow="clipboard-read; clipboard-write"></iframe>
    <div class="kb-toolbar" id="kb-toolbar">
      <button class="kb-btn" onclick="sendKey('Escape')">Esc</button>
      <button class="kb-btn" onclick="sendKey('Tab')">Tab</button>
      <button class="kb-btn" onclick="sendKey('ArrowUp')">&#9650;</button>
      <button class="kb-btn" onclick="sendKey('ArrowDown')">&#9660;</button>
      <button class="kb-btn" onclick="sendKey('ArrowLeft')">&#9664;</button>
      <button class="kb-btn" onclick="sendKey('ArrowRight')">&#9654;</button>
      <button class="kb-btn wide accent" onclick="sendKey('Enter')">Enter</button>
    </div>
  </div>

  <script>
    var pin = '';
    var maxLen = 4;
    var checking = false;

    function updateDots() {
      var dots = document.getElementById('pin-dots').children;
      for (var i = 0; i < dots.length; i++) {
        dots[i].className = 'pin-dot' + (i < pin.length ? ' filled' : '');
      }
    }

    function showError() {
      var dots = document.getElementById('pin-dots').children;
      var msg = document.getElementById('pin-msg');
      for (var i = 0; i < dots.length; i++) {
        dots[i].className = 'pin-dot error';
      }
      msg.textContent = 'Wrong PIN';
      msg.className = 'pin-subtitle error';
      setTimeout(function() {
        pin = '';
        updateDots();
        msg.textContent = 'Enter PIN';
        msg.className = 'pin-subtitle';
        checking = false;
      }, 800);
    }

    function unlock() {
      document.getElementById('pin-screen').classList.add('hidden');
      document.getElementById('terminal').classList.add('show');
      document.getElementById('tty-frame').src = 'http://100.103.233.31:3001';
    }

    function pinKey(digit) {
      if (checking) return;
      if (pin.length >= maxLen) return;
      pin += digit;
      updateDots();
      if (pin.length === maxLen) {
        checking = true;
        setTimeout(verifyPin, 200);
      }
    }

    function pinDelete() {
      if (checking) return;
      if (pin.length > 0) {
        pin = pin.slice(0, -1);
        updateDots();
      }
    }

    function verifyPin() {
      fetch('/api/code/verify-pin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin: pin })
      }).then(function(r) {
        if (r.ok) { unlock(); return; }
        throw new Error('bad');
      }).catch(function() {
        showError();
      });
    }

    // Keyboard support for PIN
    document.addEventListener('keydown', function(e) {
      if (document.getElementById('pin-screen').classList.contains('hidden')) return;
      if (e.key >= '0' && e.key <= '9') pinKey(e.key);
      if (e.key === 'Backspace') pinDelete();
    });

    // iOS keyboard toolbar — show on touch devices
    var isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

    function showToolbar() {
      var tb = document.getElementById('kb-toolbar');
      if (tb) tb.classList.add('show');
    }

    function hideToolbar() {
      var tb = document.getElementById('kb-toolbar');
      if (tb) tb.classList.remove('show');
    }

    // Show toolbar as soon as terminal is unlocked on touch devices
    var origUnlock = unlock;
    unlock = function() {
      origUnlock();
      if (isTouchDevice) {
        setTimeout(showToolbar, 500);
      }
    };

    // Send key to the ttyd iframe's terminal
    function sendKey(key) {
      var frame = document.getElementById('tty-frame');
      if (!frame || !frame.contentWindow) return;

      // ttyd uses xterm.js — we need to send the ANSI escape sequence
      // via the terminal's websocket. The easiest way: post a message
      // that xterm.js can interpret, or directly write to the terminal.

      // Try to find the xterm terminal instance inside the iframe
      try {
        var termEl = frame.contentDocument.querySelector('.xterm-helper-textarea');
        if (termEl) {
          termEl.focus();
          // Dispatch a keyboard event
          var keyCode = {
            'Escape': 27, 'Tab': 9, 'Enter': 13,
            'ArrowUp': 38, 'ArrowDown': 40, 'ArrowLeft': 37, 'ArrowRight': 39
          }[key] || 0;

          var ev = new KeyboardEvent('keydown', {
            key: key, code: key, keyCode: keyCode, which: keyCode,
            bubbles: true, cancelable: true
          });
          termEl.dispatchEvent(ev);
          return;
        }
      } catch(e) {
        // Cross-origin — can't access iframe DOM directly
      }

      // Fallback: use postMessage to communicate with ttyd
      // ttyd's xterm listens for key events on its own textarea
      // We can send ANSI sequences via the websocket by posting to the iframe
      var ansi = {
        'Escape': '\x1b',
        'Tab': '\t',
        'Enter': '\r',
        'ArrowUp': '\x1b[A',
        'ArrowDown': '\x1b[B',
        'ArrowRight': '\x1b[C',
        'ArrowLeft': '\x1b[D'
      }[key];

      if (ansi) {
        frame.contentWindow.postMessage({ type: 'ttyd-input', data: ansi }, '*');
      }
    }

    // Listen for when the iframe loads ttyd — inject a message listener
    // that forwards our key presses to the terminal websocket
    function injectKeyRelay() {
      var frame = document.getElementById('tty-frame');
      if (!frame) return;

      frame.addEventListener('load', function() {
        try {
          // Inject a script into the ttyd iframe that listens for our postMessages
          var script = frame.contentDocument.createElement('script');
          script.textContent = '(' + function() {
            window.addEventListener('message', function(e) {
              if (e.data && e.data.type === 'ttyd-input' && e.data.data) {
                // Find the terminal's websocket and send data
                // ttyd stores the terminal on window.term
                if (window.term && window.term.socket && window.term.socket.readyState === 1) {
                  // ttyd protocol: first byte 0 = input
                  var encoder = new TextEncoder();
                  var data = encoder.encode(e.data.data);
                  var buf = new Uint8Array(data.length + 1);
                  buf[0] = 0; // INPUT type
                  buf.set(data, 1);
                  window.term.socket.send(buf);
                }
              }
            });
          }.toString() + ')()';
          frame.contentDocument.head.appendChild(script);
        } catch(err) {
          // Cross-origin, can't inject
        }
      });
    }

    // Also always show toolbar on touch since it's useful
    if (isTouchDevice) {
      // Toolbar shows after unlock
      injectKeyRelay();
    }
  </script>
</body>
</html>
